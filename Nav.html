<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap');
</style>
</helmet>
<header style="position:sticky;top:0;z-index:100;background:#10203Ef2;backdrop-filter:blur(8px);border-bottom:1px solid #C9A22740;font-family:'Manrope',sans-serif;">
  <div style="max-width:1280px;margin:0 auto;padding:{{ headerPad }};display:flex;flex-direction:column;gap:6px;">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:24px;">
    <a href="index.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;">
      <img src="assets/logo-ahs.png" alt="AHS" style="height:{{ logoH }};width:auto;object-fit:contain;" />
      <div style="display:flex;flex-direction:column;line-height:1.1;">
        <span style="font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:#F7F5EF;letter-spacing:0.03em;">AHS</span>
        <span style="font-size:9px;letter-spacing:0.18em;color:#C9A227;text-transform:uppercase;">Algarve Home Stay</span>
      </div>
    </a>

    <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ false }}">
      <button onclick="{{ toggleMobile }}" aria-label="Menu" style="background:none;border:none;padding:8px;display:flex;flex-direction:column;gap:5px;cursor:pointer;">
        <span style="width:24px;height:2px;background:#F7F5EF;display:block;"></span>
        <span style="width:24px;height:2px;background:#F7F5EF;display:block;"></span>
        <span style="width:24px;height:2px;background:#F7F5EF;display:block;"></span>
      </button>
    </sc-if>

    <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
      <nav style="display:flex;align-items:center;gap:28px;flex-wrap:wrap;">
        <a href="index.html" style="color:{{ homeColor }};font-size:14px;font-weight:600;text-decoration:none;letter-spacing:0.02em;" style-hover="color:#C9A227;">Home</a>
        <a href="quem-somos.html" style="color:{{ quemSomosColor }};font-size:14px;font-weight:600;text-decoration:none;letter-spacing:0.02em;" style-hover="color:#C9A227;">Quem Somos</a>

        <div style="position:relative;" onmouseenter="{{ openMenu }}" onmouseleave="{{ closeMenu }}">
          <span style="color:{{ pilaresColor }};font-size:14px;font-weight:600;letter-spacing:0.02em;cursor:pointer;display:flex;align-items:center;gap:5px;">
            Pilares
            <svg width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round"/></svg>
          </span>
          <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
            <div style="position:absolute;top:28px;left:-16px;background:#0C1830;border:1px solid #C9A22740;border-radius:2px;padding:8px 0;min-width:240px;box-shadow:0 16px 40px rgba(0,0,0,0.35);">
              <sc-for list="{{ pillars }}" as="p" hint-placeholder-count="6">
                <a href="{{ p.href }}" style="display:block;padding:10px 20px;color:#EDEAE2;font-size:13px;text-decoration:none;border-left:2px solid transparent;" style-hover="border-left:2px solid #C9A227;background:#10203E;color:#C9A227;">{{ p.label }}</a>
              </sc-for>
            </div>
          </sc-if>
        </div>

        <a href="casos-sucesso.html" style="color:{{ casosColor }};font-size:14px;font-weight:600;text-decoration:none;letter-spacing:0.02em;" style-hover="color:#C9A227;">Casos de Sucesso</a>
        <a href="insights.html" style="color:{{ insightsColor }};font-size:14px;font-weight:600;text-decoration:none;letter-spacing:0.02em;" style-hover="color:#C9A227;">Insights</a>
        <a href="contacto.html" style="color:{{ contactoColor }};font-size:14px;font-weight:600;text-decoration:none;letter-spacing:0.02em;" style-hover="color:#C9A227;">Contacto</a>
      </nav>
    </sc-if>
  </div>

  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
    <div style="display:flex;justify-content:flex-end;">
      <a href="area-cliente.html" style="color:#EDEAE2;font-size:13px;font-weight:600;text-decoration:none;border-bottom:1px solid #C9A22770;padding-bottom:2px;" style-hover="color:#C9A227;border-color:#C9A227;">Área do Cliente</a>
    </div>
  </sc-if>
  </div>

  <sc-if value="{{ mobileMenuOpen }}" hint-placeholder-val="{{ false }}">
    <nav style="display:flex;flex-direction:column;padding:8px 20px 20px;border-top:1px solid #C9A22730;">
      <a href="index.html" style="color:{{ homeColor }};font-size:16px;font-weight:600;text-decoration:none;padding:12px 0;border-bottom:1px solid #C9A22720;">Home</a>
      <a href="quem-somos.html" style="color:{{ quemSomosColor }};font-size:16px;font-weight:600;text-decoration:none;padding:12px 0;border-bottom:1px solid #C9A22720;">Quem Somos</a>
      <sc-for list="{{ pillars }}" as="p" hint-placeholder-count="6">
        <a href="{{ p.href }}" style="color:#EDEAE2;font-size:15px;font-weight:500;text-decoration:none;padding:12px 0 12px 14px;border-bottom:1px solid #C9A22720;">{{ p.label }}</a>
      </sc-for>
      <a href="casos-sucesso.html" style="color:{{ casosColor }};font-size:16px;font-weight:600;text-decoration:none;padding:12px 0;border-bottom:1px solid #C9A22720;">Casos de Sucesso</a>
      <a href="insights.html" style="color:{{ insightsColor }};font-size:16px;font-weight:600;text-decoration:none;padding:12px 0;border-bottom:1px solid #C9A22720;">Insights</a>
      <a href="contacto.html" style="color:{{ contactoColor }};font-size:16px;font-weight:600;text-decoration:none;padding:12px 0;border-bottom:1px solid #C9A22720;">Contacto</a>
      <a href="area-cliente.html" style="color:#EDEAE2;font-size:15px;font-weight:600;text-decoration:none;padding:12px 0;">Área do Cliente</a>
    </nav>
  </sc-if>
</header>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { menuOpen: false, mobileMenuOpen: false, width: typeof window !== 'undefined' ? window.innerWidth : 1280 };

  componentDidMount() {
    this._onResize = () => this.setState({ width: window.innerWidth });
    window.addEventListener('resize', this._onResize);
  }

  componentWillUnmount() {
    window.removeEventListener('resize', this._onResize);
  }

  renderVals() {
    const active = this.props.active || '';
    const gold = '#C9A227';
    const off = '#EDEAE2';
    const pillars = [
      { label: 'Investimento', href: 'investimento.html' },
      { label: 'Consultoria Estratégica', href: 'consultoria.html' },
      { label: 'Desenvolvimento', href: 'desenvolvimento.html' },
      { label: 'Construção & Remodelação', href: 'construcao-remodelacao.html' },
      { label: 'Exploração', href: 'exploracao.html' },
      { label: 'Gestão Patrimonial', href: 'gestao-patrimonial.html' },
    ];
    const isPillar = ['investimento','consultoria','desenvolvimento','construcao','exploracao','gestao-patrimonial'].includes(active);
    const isMobile = this.state.width < 900;
    return {
      isMobile,
      isDesktop: !isMobile,
      headerPad: isMobile ? '12px 20px' : '14px 32px 10px',
      logoH: isMobile ? '34px' : '40px',
      homeColor: active === 'home' ? gold : off,
      quemSomosColor: active === 'quem-somos' ? gold : off,
      pilaresColor: isPillar ? gold : off,
      casosColor: active === 'casos-sucesso' ? gold : off,
      insightsColor: active === 'insights' ? gold : off,
      contactoColor: active === 'contacto' ? gold : off,
      pillars,
      menuOpen: this.state.menuOpen,
      mobileMenuOpen: this.state.mobileMenuOpen,
      openMenu: () => this.setState({ menuOpen: true }),
      closeMenu: () => this.setState({ menuOpen: false }),
      toggleMobile: () => this.setState(s => ({ mobileMenuOpen: !s.mobileMenuOpen })),
    };
  }
}
</script>
</body>
</html>
