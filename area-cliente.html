<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<title>Área do Cliente — AHS Algarve Home Stay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap');
body{margin:0;background:#F7F5EF;}
a{color:#C9A227;}
a:hover{color:#10203E;}
input{font-family:'Manrope',sans-serif;}
</style>
</helmet>
<div style="font-family:'Manrope',sans-serif;background:#F7F5EF;color:#1B2430;">
<dc-import name="Nav" active="area-cliente" hint-size="100%,80px"></dc-import>

<section style="min-height:78vh;display:flex;align-items:center;justify-content:center;background:#10203E;padding:56px 20px;">
  <div style="max-width:420px;width:100%;background:#0C1830;padding:40px 28px;border-top:3px solid #C9A227;box-sizing:border-box;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:11px;letter-spacing:0.2em;text-transform:uppercase;color:#C9A227;margin-bottom:10px;">Powered by Lodgra</div>
      <h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:26px;color:#FBFAF6;margin:0;">Área do Cliente</h1>
      <p style="font-size:13px;color:#9BA0AE;margin:10px 0 0;line-height:1.5;">Aceda ao seu dashboard financeiro, rentabilidade e evolução patrimonial.</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px;">
      <input type="email" placeholder="Email" style="border:1px solid #ffffff20;background:#10203E;color:#FBFAF6;padding:14px;font-size:14px;" />
      <input type="password" placeholder="Palavra-passe" style="border:1px solid #ffffff20;background:#10203E;color:#FBFAF6;padding:14px;font-size:14px;" />
      <button type="button" style="background:#C9A227;color:#10203E;border:none;font-size:14px;font-weight:700;padding:15px;letter-spacing:0.02em;cursor:pointer;">Entrar</button>
    </div>
    <p style="text-align:center;font-size:12px;color:#6B7080;margin:24px 0 0;">Ainda não tem acesso? <a href="contacto.html" style="color:#C9A227;font-weight:700;">Fale connosco</a></p>
  </div>
</section>

<dc-import name="Footer" hint-size="100%,400px"></dc-import>
</div>

</x-dc>
</body>
</html>
